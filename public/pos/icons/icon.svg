<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Full-canvas background gradient (fills maskable safe zone) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative rings (within safe zone 10%-90%) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(251,191,36,0.12)" stroke-width="2"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>

  <!-- Soft center glow -->
  <circle cx="256" cy="240" r="130" fill="rgba(59,130,246,0.15)"/>

  <!-- Main "MT" monogram (stays within center 60%) -->
  <text x="256" y="290"
        font-family="Arial Black, Arial, sans-serif"
        font-size="180"
        font-weight="900"
        text-anchor="middle"
        fill="url(#gold)"
        letter-spacing="-6"
        filter="url(#shadow)">MT</text>

  <!-- "POS" label below monogram -->
  <text x="256" y="360"
        font-family="Arial, sans-serif"
        font-size="48"
        font-weight="800"
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="12"
        opacity="0.95">POS</text>

  <!-- Accent line under POS -->
  <line x1="200" y1="378" x2="312" y2="378"
        stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
</svg>
