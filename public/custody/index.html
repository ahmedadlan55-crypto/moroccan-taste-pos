<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عهدتي — Moroccan Taste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d47a1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MT Custody">

  <!-- Auth gate -->
  <script>
    (function() {
      try {
        if (!localStorage.getItem('pos_token') || !localStorage.getItem('pos_session')) {
          window.location.replace('/');
          return;
        }
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('authenticated');
        });
      } catch (e) { window.location.replace('/'); }
    })();
  </script>
  <style>
    html, body { background: #0f172a; }
    body:not(.authenticated) { visibility: hidden !important; }
  </style>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/custody/style.css">

  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/custody/app.js"></script>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p>جاري التحميل...</p>
  </div>

  <!-- Main App Shell -->
  <div id="app" style="display:none;">

    <!-- Top Bar -->
    <header id="topBar">
      <div class="tb-right">
        <div class="tb-avatar"><i class="fas fa-hand-holding-usd"></i></div>
        <div>
          <div class="tb-title" id="headerName">عهدتي</div>
          <div class="tb-sub" id="headerNum"></div>
        </div>
      </div>
      <div class="tb-actions">
        <button class="tb-btn refresh-btn" onclick="refreshData()" title="تحديث">
          <i class="fas fa-sync-alt"></i>
        </button>
        <button class="tb-btn logout-btn" onclick="doLogout()" title="خروج">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <!-- Scrollable Content -->
    <main id="mainContent">

      <!-- Stats Strip -->
      <div class="stats-strip">
        <div class="stat-card stat-balance">
          <i class="fas fa-wallet"></i>
          <div class="stat-body">
            <span class="stat-label">الرصيد</span>
            <span class="stat-val" id="sBalance">0.00</span>
          </div>
        </div>
        <div class="stat-card stat-in">
          <i class="fas fa-arrow-circle-up"></i>
          <div class="stat-body">
            <span class="stat-label">التغذية</span>
            <span class="stat-val" id="sTopups">0.00</span>
          </div>
        </div>
        <div class="stat-card stat-out">
          <i class="fas fa-arrow-circle-down"></i>
          <div class="stat-body">
            <span class="stat-label">المصروفات</span>
            <span class="stat-val" id="sExpenses">0.00</span>
          </div>
        </div>
      </div>

      <!-- Expenses Header -->
      <div class="list-header">
        <h3><i class="fas fa-list-alt"></i> سجل المصروفات</h3>
        <span class="badge-count" id="expBadge">0</span>
      </div>

      <!-- Expenses List -->
      <div id="expList" class="exp-list"></div>

    </main>

    <!-- FAB -->
    <button class="fab" onclick="openModal()">
      <i class="fas fa-plus"></i>
      <span>إضافة مصروف</span>
    </button>

  </div>

  <!-- Add Expense Bottom Sheet -->
  <div id="sheet" class="bottom-sheet" style="display:none;">
    <div class="sheet-overlay" onclick="closeModal()"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-title">
        <i class="fas fa-receipt"></i> مصروف جديد
      </div>

      <div class="field-row">
        <div class="field">
          <label>التاريخ</label>
          <input type="date" id="fDate" class="fi">
        </div>
        <div class="field">
          <label>القيمة</label>
          <input type="number" id="fAmt" class="fi" inputmode="decimal" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="field full">
        <label>البيان</label>
        <input type="text" id="fDesc" class="fi" placeholder="وصف المصروف...">
      </div>
      <div class="field-row">
        <div class="field">
          <label>ضريبة؟</label>
          <select id="fVat" class="fi" onchange="togVat()">
            <option value="0">لا</option>
            <option value="1">نعم</option>
          </select>
        </div>
        <div class="field" id="vatBox" style="display:none;">
          <label>النسبة %</label>
          <input type="number" id="fVatR" class="fi" value="15" step="0.1">
        </div>
      </div>
      <div class="field full">
        <label>ملاحظات</label>
        <input type="text" id="fNotes" class="fi" placeholder="اختياري...">
      </div>
      <div class="field full">
        <label>صورة الفاتورة</label>
        <label class="upload-area" for="fImg" id="uploadLabel">
          <i class="fas fa-camera"></i>
          <span>اضغط لرفع صورة أو PDF</span>
        </label>
        <input type="file" id="fImg" accept="image/*,application/pdf" capture="environment" onchange="pickImg(this)" style="display:none;">
        <div id="imgPrev"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="doSave()">
        <i class="fas fa-paper-plane"></i> إرسال المصروف
      </button>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="viewer" class="img-viewer" style="display:none;" onclick="closeViewer()">
    <img id="viewerImg" src="">
    <button class="viewer-close"><i class="fas fa-times"></i></button>
  </div>

  <!-- Toast -->
  <div id="toasts"></div>

</body>
</html>
