<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عهدتي — Moroccan Taste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d47a1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MT Custody">

  <!-- Auth gate — custody role only -->
  <script>
    (function() {
      try {
        var token = localStorage.getItem('pos_token');
        var session = localStorage.getItem('pos_session');
        if (!token || !session) { window.location.replace('/'); return; }
        // Only custody users can access this page
        var s = JSON.parse(session);
        var role = (s.role || '').toLowerCase();
        if (role !== 'custody') {
          // Wrong role — redirect to correct page
          if (role === 'cashier') { window.location.replace('/pos/'); return; }
          window.location.replace('/'); return;
        }
        // Prevent browser back to other pages
        history.pushState(null, '', '/custody/');
        window.addEventListener('popstate', function() {
          history.pushState(null, '', '/custody/');
        });
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('authenticated');
        });
      } catch (e) { window.location.replace('/'); }
    })();
  </script>
  <style>
    html, body { background: #0f172a; }
    body:not(.authenticated) { visibility: hidden !important; }
  </style>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/custody/style.css">

  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/custody/app.js"></script>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p>جاري التحميل...</p>
  </div>

  <!-- Main App Shell -->
  <div id="app" style="display:none;">

    <!-- Top Bar -->
    <header id="topBar">
      <div class="tb-right">
        <div class="tb-avatar"><i class="fas fa-hand-holding-usd"></i></div>
        <div>
          <div class="tb-title" id="headerName">عهدتي</div>
          <div class="tb-sub" id="headerNum"></div>
        </div>
      </div>
      <div class="tb-actions">
        <button class="tb-btn refresh-btn" onclick="refreshData()" title="تحديث">
          <i class="fas fa-sync-alt"></i>
        </button>
        <button class="tb-btn logout-btn" onclick="doLogout()" title="خروج">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <!-- Scrollable Content -->
    <main id="mainContent">

      <!-- Branch Name -->
      <div class="branch-bar" id="branchBar" style="display:none;">
        <i class="fas fa-store"></i>
        <span id="branchName"></span>
      </div>

      <!-- Stats Strip -->
      <div class="stats-strip">
        <div class="stat-card stat-balance">
          <i class="fas fa-wallet"></i>
          <div class="stat-body">
            <span class="stat-label">الرصيد</span>
            <span class="stat-val" id="sBalance">0.00</span>
          </div>
        </div>
        <div class="stat-card stat-in">
          <i class="fas fa-arrow-circle-up"></i>
          <div class="stat-body">
            <span class="stat-label">التغذية</span>
            <span class="stat-val" id="sTopups">0.00</span>
          </div>
        </div>
        <div class="stat-card stat-out">
          <i class="fas fa-arrow-circle-down"></i>
          <div class="stat-body">
            <span class="stat-label">المصروفات</span>
            <span class="stat-val" id="sExpenses">0.00</span>
          </div>
        </div>
      </div>

      <!-- Expenses Header -->
      <div class="list-header">
        <h3><i class="fas fa-list-alt"></i> سجل المصروفات</h3>
        <span class="badge-count" id="expBadge">0</span>
      </div>

      <!-- Expenses List -->
      <div id="expList" class="exp-list"></div>

    </main>

    <!-- Action Buttons -->
    <div class="action-bar">
      <button class="fab" onclick="openModal()">
        <i class="fas fa-plus"></i>
        <span>إضافة مصروف</span>
      </button>
      <button class="close-btn" id="closeBtn" onclick="requestClose()" style="display:none;">
        <i class="fas fa-lock"></i>
        <span>إقفال العهدة</span>
      </button>
    </div>

  </div>

  <!-- Add Expense Bottom Sheet -->
  <div id="sheet" class="bottom-sheet" style="display:none;">
    <div class="sheet-overlay" onclick="closeModal()"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-title">
        <i class="fas fa-receipt"></i> مصروف جديد
      </div>

      <div class="field-row">
        <div class="field">
          <label>التاريخ</label>
          <input type="date" id="fDate" class="fi">
        </div>
        <div class="field">
          <label>القيمة</label>
          <input type="number" id="fAmt" class="fi" inputmode="decimal" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="field full">
        <label>نوع المصروف</label>
        <select id="fExpType" class="fi" onchange="onExpTypeChange()">
          <option value="">— اختر نوع المصروف —</option>
        </select>
      </div>
      <div class="field full">
        <label>البيان</label>
        <input type="text" id="fDesc" class="fi" placeholder="وصف المصروف...">
      </div>
      <div class="field-row">
        <div class="field">
          <label>ضريبة؟</label>
          <select id="fVat" class="fi" onchange="togVat()">
            <option value="0">لا</option>
            <option value="1">نعم</option>
          </select>
        </div>
        <div class="field" id="vatBox" style="display:none;">
          <label>النسبة %</label>
          <input type="number" id="fVatR" class="fi" value="15" step="0.1">
        </div>
      </div>
      <div class="field full">
        <label>ملاحظات</label>
        <input type="text" id="fNotes" class="fi" placeholder="اختياري...">
      </div>
      <div class="field full">
        <label>صورة الفاتورة</label>
        <label class="upload-area" for="fImg" id="uploadLabel">
          <i class="fas fa-camera"></i>
          <span>اضغط لرفع صورة أو PDF</span>
        </label>
        <input type="file" id="fImg" accept="image/*,application/pdf" capture="environment" onchange="pickImg(this)" style="display:none;">
        <div id="imgPrev"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="doSave()">
        <i class="fas fa-paper-plane"></i> إرسال المصروف
      </button>
    </div>
  </div>

  <!-- Override Confirm Sheet -->
  <div id="overrideSheet" class="bottom-sheet" style="display:none;">
    <div class="sheet-overlay" onclick="closeOverride()"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-title" style="color:var(--amber);">
        <i class="fas fa-exclamation-triangle"></i> تجاوز الرصيد
      </div>
      <div id="overrideMsg" style="padding:12px 0;font-size:14px;line-height:1.7;color:#475569;"></div>
      <div style="display:flex;gap:10px;">
        <button class="save-btn" style="background:linear-gradient(135deg,var(--amber),#d97706);" onclick="confirmOverride()">
          <i class="fas fa-paper-plane"></i> إرسال طلب تجاوز
        </button>
        <button style="flex:0 0 auto;padding:14px 20px;border:none;border-radius:14px;background:rgba(100,116,139,0.1);color:var(--slate);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="closeOverride()">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Close Custody Sheet -->
  <div id="closeSheet" class="bottom-sheet" style="display:none;">
    <div class="sheet-overlay" onclick="closeCloseSheet()"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-title" style="color:var(--red);">
        <i class="fas fa-lock"></i> طلب إقفال العهدة
      </div>
      <div id="closeInfo" style="padding:12px 0;font-size:14px;line-height:1.7;color:#475569;"></div>
      <div class="field full">
        <label>ملاحظات (اختياري)</label>
        <input type="text" id="closeNotes" class="fi" placeholder="سبب الإقفال...">
      </div>
      <button class="save-btn" style="background:linear-gradient(135deg,var(--red),#b91c1c);margin-top:10px;" id="closeSaveBtn" onclick="confirmClose()">
        <i class="fas fa-lock"></i> تأكيد طلب الإقفال
      </button>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="viewer" class="img-viewer" style="display:none;" onclick="closeViewer()">
    <img id="viewerImg" src="">
    <button class="viewer-close"><i class="fas fa-times"></i></button>
  </div>

  <!-- Toast -->
  <div id="toasts"></div>

</body>
</html>
