<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بوابة الموظف</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <script>document.addEventListener('DOMContentLoaded',function(){document.body.style.visibility='visible';}); setTimeout(function(){document.body.style.visibility='visible';},500);</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;direction:rtl;background:#fafbfc;color:#1a1a2e;height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:100vw;}
    body{visibility:hidden;}
    #app{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;color:#1e293b;height:54px;flex-shrink:0;border-bottom:1px solid #eee;}
    .hdr-r{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
    .hdr-av{width:38px;height:38px;border-radius:12px;background:#0ea5e9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .hdr-n{font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#0f172a;}
    .hdr-s{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .hdr-b{display:flex;gap:6px;flex-shrink:0;}
    .hdr-b button{width:34px;height:34px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#64748b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .hdr-b button:active{background:#f3f4f6;}
    .main{flex:1;overflow-y:auto;padding:14px;padding-bottom:70px;}
    .clock-btn{width:100%;padding:20px 16px;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:12px;font-family:inherit;text-align:right;color:#fff;}
    .clock-btn:active{transform:scale(.98);}
    .clock-btn i{font-size:32px;}
    .clock-lbl{font-size:18px;font-weight:900;}
    .clock-time{font-size:13px;opacity:.85;margin-top:3px;font-family:monospace;}
    .ci{background:#0ea5e9;box-shadow:0 6px 20px rgba(14,165,233,.3);}
    .co{background:#f43f5e;box-shadow:0 6px 20px rgba(244,63,94,.3);}
    .cd{background:#f0fdf4;color:#059669;border:2px solid #a7f3d0;cursor:default;box-shadow:none;}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .st{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;border:1px solid #f0f0f0;}
    .st i{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto 4px;}
    .st b{display:block;font-size:20px;font-weight:900;color:#0f172a;}
    .st span{font-size:9px;color:#94a3b8;font-weight:700;}
    .card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid #f0f0f0;}
    .card-t{font-size:14px;font-weight:800;color:#0f172a;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .card-t i{color:#0ea5e9;font-size:14px;}
    .ar{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:12px;}
    .ar:last-child{border-bottom:none;}
    .ad{font-weight:700;min-width:60px;color:#374151;flex-shrink:0;}
    .at{flex:1;color:#6b7280;}
    .ah{font-weight:900;color:#0ea5e9;flex-shrink:0;font-size:13px;}
    .meta{font-size:9px;color:#9ca3af;margin-top:2px;}
    .lc{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
    .lc:last-child{border-bottom:none;}
    .pf{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
    .pf:last-child{border-bottom:none;}
    .pf span{color:#6b7280;} .pf b{color:#111827;}
    .badge{padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;background:#e0f2fe;color:#0369a1;}
    .empty{text-align:center;color:#9ca3af;padding:24px;font-size:13px;}
    .bnav{display:flex;background:#fff;border-top:1px solid #f0f0f0;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0));position:fixed;bottom:0;left:0;right:0;z-index:50;}
    .nt{flex:1;text-align:center;padding:4px;cursor:pointer;color:#9ca3af;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .nt i{font-size:20px;}
    .nt.active{color:#0ea5e9;}
    .btn-m{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:800;border:none;cursor:pointer;background:#0ea5e9;color:#fff;margin-bottom:10px;}
    .btn-m:active{transform:scale(.98);}
    .fg{margin-bottom:12px;} .fg label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:4px;}
    .fi{width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;background:#fff;}
    .fi:focus{border-color:#0ea5e9;outline:none;}
    .toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;display:none;max-width:90%;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.1);}
    .toast.show{display:block;animation:sd .25s ease;} .toast.ok{background:#111827;color:#fff;} .toast.err{background:#f43f5e;color:#fff;}
    @keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    .page{display:none;} .page.active{display:block;}
    .login-w{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;background:#fafbfc;}
    .login-b{background:#fff;border-radius:20px;padding:36px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.04);}
    .login-b h1{font-size:22px;color:#111827;margin-bottom:4px;} .login-b p{color:#6b7280;font-size:12px;margin-bottom:24px;}
    .login-b input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:16px;margin-bottom:12px;text-align:right;background:#fafbfc;}
    .login-b input:focus{border-color:#0ea5e9;outline:none;background:#fff;}
    .login-b button{width:100%;padding:14px;background:#0ea5e9;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;}
    .login-b button:active{background:#0284c7;}
    .modal{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
    .modal.show{opacity:1;pointer-events:all;}
    .modal-c{background:#fff;border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:380px;transform:translateY(100%);transition:transform .3s;}
    .modal.show .modal-c{transform:translateY(0);}
    .modal-h{display:flex;justify-content:space-between;font-size:14px;font-weight:800;margin-bottom:10px;}
    .modal-h button{width:26px;height:26px;border-radius:6px;background:#f1f5f9;border:none;font-size:14px;cursor:pointer;}
  </style>
  <script defer src="/shared/api-bridge.js"></script>
  <style>
    .lang-btn{width:40px;height:34px;border-radius:10px;border:1.5px solid #bae6fd;background:#e0f2fe;color:#0369a1;font-size:11px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;letter-spacing:.5px;}
    .lang-btn:active{background:#bae6fd;}
    html[lang="en"] body{direction:ltr;}
    html[lang="en"] .hdr-n,html[lang="en"] .hdr-s{text-align:left;}
  </style>
  <script defer src="/employee/app.js?v=16"></script>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="loginPage" class="login-w">
  <div class="login-b">
    <button type="button" onclick="toggleLang()" class="lang-btn" style="position:absolute;top:16px;right:16px;" id="langToggleBtn" title="Language">EN</button>
    <div style="width:56px;height:56px;border-radius:14px;background:#0ea5e9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;"><i class="fas fa-user-tie"></i></div>
    <h1 data-i18n="login.title">بوابة الموظف</h1>
    <p style="color:#6b7280;font-size:12px;margin-bottom:24px;" data-i18n="login.sub">سجّل دخولك لتسجيل الحضور</p>
    <input type="text" id="lu" placeholder="اسم المستخدم" data-i18n-placeholder="login.u">
    <input type="password" id="lp" placeholder="كلمة المرور" data-i18n-placeholder="login.p">
    <button id="lbtn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> <span data-i18n="login.btn">دخول</span></button>
  </div>
</div>
<script>
function _toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show err';setTimeout(function(){t.className='toast';},3500);}
function _tr(key, fallback){ try { return (window.t && window.t(key)) || fallback; } catch(e){ return fallback; } }
function doLogin(){
  var u=document.getElementById('lu').value,p=document.getElementById('lp').value;
  if(!u||!p)return _toast(_tr('login.fill','أدخل البيانات'));
  var btn=document.getElementById('lbtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
  var xhr=new XMLHttpRequest();xhr.open('POST','/api/auth/login',true);xhr.setRequestHeader('Content-Type','application/json');
  xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> '+_tr('login.btn','دخول');
    try{var r=JSON.parse(xhr.responseText);
      if(r&&r.success&&r.token){
        localStorage.setItem('emp_token',r.token);
        localStorage.setItem('emp_session',JSON.stringify({username:r.username,role:r.role,brandId:r.brandId||'',branchId:r.branchId||''}));
        location.reload();
      } else _toast(r?r.error:_tr('login.failed','فشل الدخول'));
    }catch(e){_toast(_tr('login.error','خطأ في الاتصال')+': '+e.message);}
  };xhr.send(JSON.stringify({username:u,password:p}));
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('loginPage')&&document.getElementById('loginPage').style.display!=='none')doLogin();});
</script>
<div id="app" style="display:none;">
  <div class="hdr">
    <div class="hdr-r"><div class="hdr-av"><i class="fas fa-user-tie"></i></div><div><div class="hdr-n" id="hdrName" data-i18n="header.employee">الموظف</div><div class="hdr-s" id="hdrSub"></div></div></div>
    <div class="hdr-b">
      <button onclick="toggleLang()" class="lang-btn" id="langToggleBtn" title="Language">EN</button>
      <button onclick="doRefresh()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
      <button style="background:rgba(239,68,68,.3);" onclick="doLogout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
  <div class="main">
    <div class="page active" id="pghome"><div id="clockSection"></div><div class="stats" id="homeStats"></div><div class="card"><div class="card-t"><i class="fas fa-history"></i> <span data-i18n="home.recent">آخر الحضور</span></div><div id="recentAtt"></div></div></div>
    <div class="page" id="pgatt"><div class="stats" id="attStats"></div><div class="card"><div class="card-t"><i class="fas fa-calendar-check"></i> <span data-i18n="att.log">سجل الحضور</span></div><div id="attList"></div></div></div>
    <div class="page" id="pgleave"><div class="card"><div class="card-t"><i class="fas fa-umbrella-beach"></i> <span data-i18n="leave.balances">أرصدة الإجازات</span></div><div id="leaveBals"></div></div><button class="btn-m" onclick="openLeaveForm()"><i class="fas fa-plus"></i> <span data-i18n="leave.newBtn">طلب إجازة</span></button><div class="card"><div class="card-t"><i class="fas fa-list"></i> <span data-i18n="leave.myRequests">طلباتي</span></div><div id="leaveReqs"></div></div></div>
    <div class="page" id="pgtxn">
      <!-- Tab switcher: Incoming / Outgoing -->
      <div style="display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:12px;">
        <button id="txnTabInc" onclick="txnSwitchTab('inc')" style="flex:1;padding:10px;border:none;background:#fff;color:#0ea5e9;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);">
          <i class="fas fa-inbox"></i> <span data-i18n="txn.tab.inc" data-i18n-label>الوارد</span> <span id="txnIncBadge" style="background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-right:4px;display:none;">0</span>
        </button>
        <button id="txnTabOut" onclick="txnSwitchTab('out')" style="flex:1;padding:10px;border:none;background:transparent;color:#64748b;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;">
          <i class="fas fa-paper-plane"></i> <span data-i18n="txn.tab.out" data-i18n-label>الصادر</span>
        </button>
      </div>
      <!-- Incoming subpage -->
      <div id="txnSubInc">
        <div class="card"><div class="card-t"><i class="fas fa-inbox"></i> <span data-i18n="txn.awaitingMe">في انتظار إجرائي</span></div><div id="incomingTxnList"></div></div>
      </div>
      <!-- Outgoing subpage -->
      <div id="txnSubOut" style="display:none;">
        <button class="btn-m" onclick="openTxnModal()"><i class="fas fa-plus"></i> <span data-i18n="txn.newBtn">معاملة جديدة</span></button>
        <div class="card"><div class="card-t"><i class="fas fa-paper-plane"></i> <span data-i18n="txn.mySent">معاملاتي المرسلة</span></div><div id="myTxnList"></div></div>
      </div>
    </div>
    <div class="page" id="pgme"><div class="card"><div class="card-t"><i class="fas fa-id-card"></i> <span data-i18n="profile.info">بياناتي</span></div><div id="profileInfo"></div></div><div class="card"><div class="card-t"><i class="fas fa-money-bill-wave"></i> <span data-i18n="profile.salaries">الرواتب</span></div><div id="payslips"></div></div></div>
  </div>
  <nav class="bnav">
    <div class="nt active" onclick="navTo('home',this)"><i class="fas fa-home"></i><span data-i18n="nav.home">الرئيسية</span></div>
    <div class="nt" onclick="navTo('att',this)"><i class="fas fa-fingerprint"></i><span data-i18n="nav.att">البصمة</span></div>
    <div class="nt" onclick="navTo('txn',this)"><i class="fas fa-file-alt"></i><span data-i18n="nav.txn">معاملات</span></div>
    <div class="nt" onclick="navTo('leave',this)"><i class="fas fa-calendar"></i><span data-i18n="nav.leave">إجازات</span></div>
    <div class="nt" onclick="navTo('me',this)"><i class="fas fa-user"></i><span data-i18n="nav.me">ملفي</span></div>
  </nav>
</div>
<!-- Leave Modal -->
<div class="modal" id="leaveModal"><div class="modal-c"><div class="modal-h"><span><i class="fas fa-calendar-plus"></i> <span data-i18n="leave.modalTitle">طلب إجازة</span></span><button onclick="closeLeaveForm()">&times;</button></div><div class="fg"><label data-i18n="leave.type">النوع</label><select class="fi" id="lfType"></select></div><div class="fg"><label data-i18n="leave.from">من</label><input type="date" class="fi" id="lfStart"></div><div class="fg"><label data-i18n="leave.to">إلى</label><input type="date" class="fi" id="lfEnd"></div><div class="fg"><label data-i18n="leave.reason">السبب</label><textarea class="fi" id="lfReason" rows="2"></textarea></div><button class="btn-m" onclick="submitLeave()"><i class="fas fa-paper-plane"></i> <span data-i18n="leave.submit">تقديم</span></button></div></div>
<!-- Transaction Modal -->
<div class="modal" id="txnModal"><div class="modal-c" style="max-height:90dvh;overflow-y:auto;">
  <div class="modal-h"><span><i class="fas fa-file-alt"></i> <span data-i18n="tm.title">معاملة جديدة</span></span><button onclick="closeTxnModal()">&times;</button></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div class="fg"><label><i class="fas fa-user"></i> <span data-i18n="tm.senderName">اسم المرسل</span></label><input class="fi" id="txnSenderName" readonly style="background:#f0fdf4;color:#166534;font-weight:700;"></div>
    <div class="fg"><label><i class="fas fa-id-badge"></i> <span data-i18n="tm.jobTitle">المسمى الوظيفي</span></label><input class="fi" id="txnJobTitle" readonly style="background:#f3f4f6;color:#6b7280;"></div>
  </div>
  <div class="fg"><label data-i18n="tm.type">نوع المعاملة *</label><select class="fi" id="txnType"></select></div>
  <div class="fg"><label data-i18n="tm.importance">درجة الأهمية *</label>
    <select class="fi" id="txnImportance">
      <option value="low" data-i18n="tm.imp.low">منخفض (Low) — أخضر</option>
      <option value="medium" selected data-i18n="tm.imp.medium">متوسط (Medium) — أصفر</option>
      <option value="high" data-i18n="tm.imp.high">عالي (High) — برتقالي</option>
      <option value="critical" data-i18n="tm.imp.critical">عاجل (Critical) — أحمر</option>
    </select>
  </div>
  <div class="fg"><label data-i18n="tm.titleLabel">العنوان *</label><input class="fi" id="txnTitle" placeholder="وصف مختصر للمعاملة" data-i18n-placeholder="tm.titlePH"></div>
  <div class="fg" style="position:relative;">
    <label><i class="fas fa-sitemap"></i> <span data-i18n="tm.glAccount">الحساب المحاسبي</span></label>
    <input class="fi" id="txnAccSearch" placeholder="ابحث برقم أو اسم الحساب..." data-i18n-placeholder="tm.glSearch" oninput="txnSearchAccount(this)" onfocus="txnSearchAccount(this)">
    <input type="hidden" id="txnAccId"><input type="hidden" id="txnAccName">
    <div id="txnAccDropdown" style="display:none;position:absolute;top:100%;right:0;left:0;z-index:200;background:#fff;border:1px solid #e5e7eb;border-radius:10px;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1);"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div class="fg"><label><i class="fas fa-building"></i> <span data-i18n="tm.costCenter">مركز التكلفة</span></label><select class="fi" id="txnCC"><option value="" data-i18n="tm.noCC">— بدون —</option></select></div>
    <div class="fg"><label><i class="fas fa-money-bill-wave"></i> <span data-i18n="tm.amount">المبلغ</span></label><input type="number" class="fi" id="txnAmount" step="0.01" min="0" value="0"></div>
  </div>
  <div class="fg"><label><i class="fas fa-user-check"></i> <span data-i18n="tm.recipient">إرسال إلى (المستلم) *</span></label><select class="fi" id="txnRecipient"><option value="" data-i18n="tm.selectRecipient">— اختر —</option></select></div>
  <div class="fg"><label data-i18n="tm.details">التفاصيل</label><textarea class="fi" id="txnDesc" rows="2" placeholder="تفاصيل إضافية" data-i18n-placeholder="tm.detailsPH"></textarea></div>
  <div class="fg"><label><i class="fas fa-paperclip"></i> <span data-i18n="tm.attachment">مرفق</span></label><input type="file" class="fi" id="txnFile" accept=".pdf,.jpg,.jpeg,.png" style="padding:8px;"></div>
  <button class="btn-m" onclick="submitTxn()"><i class="fas fa-paper-plane"></i> <span data-i18n="tm.send">إرسال المعاملة</span></button>
</div></div>
<!-- Transaction Detail Modal -->
<div class="modal" id="txnDetailModal"><div class="modal-c" style="max-height:90dvh;">
  <div class="modal-h"><span id="txnDetailTitle" data-i18n="td.title">تفاصيل المعاملة</span><button onclick="closeTxnDetail()">&times;</button></div>
  <div id="txnDetailBody"></div>
</div></div>
</body>
</html>
