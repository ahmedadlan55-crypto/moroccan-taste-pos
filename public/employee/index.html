<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بوابة الموظف</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script>
    (function(){try{var t=localStorage.getItem('pos_token'),s=localStorage.getItem('pos_session');
    if(!t||!s){document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('authenticated','needs-login');});return;}
    document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('authenticated');});
    }catch(e){document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('authenticated','needs-login');});}})();
  </script>
  <style>html,body{background:#f1f5f9;}body:not(.authenticated){visibility:hidden!important;}</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/employee/style.css?v=3">
  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/employee/app.js?v=3"></script>
</head>
<body>
<!-- No loader — app shows instantly -->
<div class="toast" id="toast"></div>

<div id="app" style="display:none;">
  <!-- Header -->
  <header id="hdr">
    <div class="hdr-r">
      <div class="hdr-av"><i class="fas fa-user-tie"></i></div>
      <div class="hdr-info"><div class="hdr-name" id="hdrName">الموظف</div><div class="hdr-sub" id="hdrSub"></div></div>
    </div>
    <div class="hdr-btns">
      <button onclick="doRefresh()"><i class="fas fa-sync-alt"></i></button>
      <button class="red" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <!-- Content -->
  <main id="content">
    <!-- HOME -->
    <div class="page active" id="pghome">
      <div id="clockSection"></div>
      <div class="stats" id="homeStats"></div>
      <div class="card"><div class="card-t"><i class="fas fa-history"></i> آخر الحضور</div><div id="recentAtt"></div></div>
    </div>
    <!-- ATTENDANCE -->
    <div class="page" id="pgatt">
      <div class="card"><div class="card-t"><i class="fas fa-calendar-check"></i> سجل الحضور</div><div id="attList"></div></div>
    </div>
    <!-- LEAVE -->
    <div class="page" id="pgleave">
      <div class="card"><div class="card-t"><i class="fas fa-umbrella-beach"></i> أرصدة الإجازات</div><div id="leaveBals"></div></div>
      <button class="btn-main" onclick="openLeaveForm()"><i class="fas fa-plus"></i> طلب إجازة</button>
      <div class="card"><div class="card-t"><i class="fas fa-list"></i> طلباتي</div><div id="leaveReqs"></div></div>
    </div>
    <!-- PROFILE -->
    <div class="page" id="pgme">
      <div class="card"><div class="card-t"><i class="fas fa-id-card"></i> بياناتي</div><div id="profileInfo"></div></div>
      <div class="card"><div class="card-t"><i class="fas fa-money-bill-wave"></i> الرواتب</div><div id="payslips"></div></div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bnav">
    <div class="nav-tab active" onclick="navTo('home',this)"><i class="fas fa-home"></i>الرئيسية</div>
    <div class="nav-tab" onclick="navTo('att',this)"><i class="fas fa-fingerprint"></i>البصمة</div>
    <div class="nav-tab" onclick="navTo('leave',this)"><i class="fas fa-calendar"></i>إجازات</div>
    <div class="nav-tab" onclick="navTo('me',this)"><i class="fas fa-user"></i>ملفي</div>
  </nav>
</div>

<!-- Leave Modal -->
<div class="modal" id="leaveModal">
  <div class="modal-c">
    <div class="modal-h"><span><i class="fas fa-calendar-plus"></i> طلب إجازة</span><button onclick="closeLeaveForm()">&times;</button></div>
    <div class="fg"><label>النوع</label><select class="fi" id="lfType"></select></div>
    <div class="fg"><label>من</label><input type="date" class="fi" id="lfStart"></div>
    <div class="fg"><label>إلى</label><input type="date" class="fi" id="lfEnd"></div>
    <div class="fg"><label>السبب</label><textarea class="fi" id="lfReason" rows="2"></textarea></div>
    <button class="btn-main" onclick="submitLeave()"><i class="fas fa-paper-plane"></i> تقديم</button>
  </div>
</div>
</body>
</html>
