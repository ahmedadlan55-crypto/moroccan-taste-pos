<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>POS - Moroccan Taste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d47a1">

  <!-- ─── PWA Manifest + Install ─── -->
  <link rel="manifest" href="/pos/manifest.json">
  <meta name="application-name" content="MT POS">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MT POS">
  <link rel="apple-touch-icon" href="/pos/icons/icon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/pos/icons/icon-192.svg">
  <link rel="apple-touch-icon" sizes="512x512" href="/pos/icons/icon-512.svg">

  <!-- Windows tile -->
  <meta name="msapplication-TileColor" content="#0d47a1">
  <meta name="msapplication-TileImage" content="/pos/icons/icon-192.svg">

  <!-- Browser tab icon -->
  <link rel="icon" type="image/svg+xml" href="/pos/icons/icon.svg">

  <!-- ─── HARD AUTH GATE ───
       Runs synchronously BEFORE any HTML body is parsed. If there is no JWT
       token in localStorage, the browser is redirected to /. Otherwise we
       register a one-shot DOMContentLoaded listener that releases the
       visibility gate as soon as the body is parsed — independent of any
       later script loading or errors. -->
  <script>
    (function() {
      try {
        if (!localStorage.getItem('pos_token') || !localStorage.getItem('pos_session')) {
          window.location.replace('/');
          return;
        }
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('authenticated');
        });
      } catch (e) { window.location.replace('/'); }
    })();
  </script>
  <style id="critical-auth-gate">
    /* Hide everything until the inline script above releases the gate */
    html, body { background: #0f172a; }
    body:not(.authenticated) { visibility: hidden !important; }
  </style>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/shared/common.css">
  <link rel="stylesheet" href="/shared/header.css">
  <link rel="stylesheet" href="/pos/style.css">

  <script defer src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/shared/common.js"></script>
  <script defer src="/shared/auth.js"></script>
  <script defer src="/shared/header.js"></script>
  <script defer src="/pos/app.js"></script>
</head>
<body class="ar" data-page="pos" data-show-shift="1">

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <h3 style="margin-top:20px;color:#fff;font-weight:800;">جاري التحميل...</h3>
  </div>

  <!-- Compact POS Top Bar -->
  <header id="appHeader" class="app-header pos-top-bar"></header>

  <!-- POS Main Layout -->
  <main class="pos-main">
    <!-- Products Area -->
    <section class="pos-products-area">
      <div class="pos-search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="posSearchInput" placeholder="البحث برقم، أو اسم المنتج..." oninput="renderMenuGrid()" autocomplete="off">
      </div>
      <div class="pos-categories" id="posCatTabs"></div>
      <div class="pos-grid" id="posItemsGrid"></div>
    </section>

    <!-- Cart Area (Glass) -->
    <aside class="pos-cart-area glass-card" id="mobileCartPanel">
      <div class="cart-header">
        <button class="btn-icon-pill mobile-close-cart" onclick="toggleMobileCart()" aria-label="رجوع">
          <i class="fas fa-arrow-right"></i>
        </button>
        <h3 class="desktop-cart-title">
          <i class="fas fa-shopping-basket"></i>
          <span data-i18n="cartTitle">سلة الطلبات</span>
        </h3>
        <div class="cart-actions">
          <button class="btn-icon-pill warn" onclick="openDiscountModal()" aria-label="خصم" title="إضافة خصم">
            <i class="fas fa-tag"></i>
          </button>
          <button class="btn-icon-pill danger" onclick="clearCart()" aria-label="مسح السلة" title="إفراغ السلة">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>

      <div class="cart-items" id="cartItemsArea"></div>

      <div class="cart-footer">
        <div class="pay-methods" id="payMethodsContainer">
          <input type="hidden" id="posPayMethod" value="Cash">
        </div>

        <div class="cart-summary-line">
          <span data-i18n="subtotal">المجموع الفرعي:</span>
          <span id="cartSubtotalText">0.00</span>
        </div>
        <div class="cart-summary-line discount-line">
          <span data-i18n="discount">الخصم:</span>
          <span id="cartDiscText">0.00</span>
        </div>

        <div class="hidden service-fee-row" id="serviceFeeRow">
          <div class="service-fee-row-top">
            <span id="serviceFeeLabel">رسوم الخدمة:</span>
            <span id="serviceFeeText">0.00</span>
          </div>
          <div class="service-fee-row-bottom">
            <input type="number" id="serviceFeeInput" step="0.01" min="0" class="form-control" placeholder="أدخل مبلغ الرسوم يدوياً" oninput="applyManualServiceFee()">
            <span class="service-fee-currency">SAR</span>
          </div>
        </div>

        <div class="cart-summary-total">
          <span data-i18n="totalLabel">الإجمالي:</span>
          <span id="cartFinalTotal">0.00 SAR</span>
        </div>

        <!-- Split payment panel -->
        <div id="splitPayPanel" class="hidden split-panel">
          <h4><i class="fas fa-divide"></i> <span data-i18n="split">تجزئة الدفع</span></h4>
          <div id="splitFields" class="split-fields"></div>
          <div class="split-remaining-row">
            <span id="splitRemainingLabel">المتبقي:</span>
            <span id="splitRemaining">0.00</span>
          </div>
        </div>

        <button class="btn btn-primary checkout-btn" onclick="doCheckout()">
          <i class="fas fa-check-circle"></i>
          <span data-i18n="checkoutBtn">إتمام الدفع والطلب</span>
        </button>
      </div>
    </aside>
  </main>

  <!-- Mobile Floating Cart Button -->
  <div class="mobile-cart-btn" id="mobileCartBtn" onclick="toggleMobileCart()">
    <div class="mobile-cart-info">
      <i class="fas fa-shopping-cart"></i>
      <span data-i18n="viewCart">السلة</span>
      <span id="mobCartCount" class="mobile-cart-count">0</span>
    </div>
    <div id="mobCartTotal" class="mobile-cart-total">0.00 SAR</div>
  </div>

  <!-- Floating Shift Controls -->
  <div class="float-actions">
    <button class="float-btn float-btn-success" onclick="shiftOpen()" title="فتح وردية" aria-label="فتح وردية">
      <i class="fas fa-play"></i>
    </button>
    <button class="float-btn float-btn-danger" onclick="shiftCloseStart()" title="إغلاق الوردية" aria-label="إغلاق الوردية">
      <i class="fas fa-stop"></i>
    </button>
  </div>

  <!-- ─── GLASS MODALS ─── -->

  <!-- Discount Modal -->
  <div id="modalDiscount" class="glass-modal hidden">
    <div class="glass-modal-content">
      <div class="glass-modal-title">
        <span><i class="fas fa-tag"></i> اختر خصماً</span>
        <button class="glass-modal-close" onclick="closeGlassModal('#modalDiscount')" aria-label="إغلاق">&times;</button>
      </div>
      <div id="discModalList" class="glass-modal-body"></div>
    </div>
  </div>

  <!-- Shift Close (entry) Modal -->
  <div id="modalShiftClose" class="glass-modal hidden">
    <div class="glass-modal-content">
      <div class="glass-modal-title">
        <span><i class="fas fa-stop-circle"></i> <span data-i18n="shiftClose">إغلاق الوردية</span></span>
        <button class="glass-modal-close" onclick="closeGlassModal('#modalShiftClose')" aria-label="إغلاق">&times;</button>
      </div>
      <div class="glass-modal-body">
        <p class="glass-modal-hint" data-i18n="enterAmounts">أدخل المبالغ الفعلية في الدرج:</p>
        <div class="form-group">
          <label class="form-label" data-i18n="cashAmount">المبلغ النقدي (كاش)</label>
          <input type="number" id="scCash" class="form-control glass-input" value="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="cardAmount">مدى / شبكة</label>
          <input type="number" id="scCard" class="form-control glass-input" value="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="kitaAmount">كيتا / آجل</label>
          <input type="number" id="scKita" class="form-control glass-input" value="0" step="0.01">
        </div>
        <div class="glass-modal-actions">
          <button class="btn btn-light" onclick="closeGlassModal('#modalShiftClose')" data-i18n="cancel">إلغاء</button>
          <button class="btn btn-danger" onclick="shiftConfirmClose()" data-i18n="confirmClose"><i class="fas fa-check-double"></i> اعتماد وإغلاق</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Shift Variance (block) Modal — shown when actuals don't match expected -->
  <div id="modalShiftVariance" class="glass-modal hidden">
    <div class="glass-modal-content danger">
      <div class="glass-modal-title">
        <span><i class="fas fa-exclamation-triangle"></i> فرق غير متوازن</span>
      </div>
      <div class="glass-modal-body" id="varianceBody"></div>
      <div class="glass-modal-actions">
        <button class="btn btn-light" onclick="closeGlassModal('#modalShiftVariance')"><i class="fas fa-arrow-right"></i> رجوع لمراجعة الفواتير</button>
      </div>
    </div>
  </div>

  <!-- Shift Report Modal — shown after a successful close, with WhatsApp share -->
  <div id="modalShiftReport" class="glass-modal hidden">
    <div class="glass-modal-content large">
      <div class="glass-modal-title">
        <span><i class="fas fa-clipboard-check"></i> تقرير إغلاق الوردية</span>
        <button class="glass-modal-close" onclick="closeGlassModal('#modalShiftReport')" aria-label="إغلاق">&times;</button>
      </div>
      <div class="glass-modal-body" id="shiftReportBody"></div>
      <div class="glass-modal-actions">
        <button class="btn btn-success" onclick="shareShiftReportWhatsApp()"><i class="fab fa-whatsapp"></i> إرسال عبر واتساب</button>
        <button class="btn btn-primary" onclick="printShiftReport()"><i class="fas fa-print"></i> طباعة</button>
        <button class="btn btn-light" onclick="closeGlassModal('#modalShiftReport')">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- Receipt Modal -->
  <div id="modalReceipt" class="glass-modal hidden">
    <div class="glass-modal-content">
      <div class="glass-modal-title">
        <span><i class="fas fa-receipt"></i> فاتورة</span>
        <button class="glass-modal-close" onclick="closeGlassModal('#modalReceipt')" aria-label="إغلاق">&times;</button>
      </div>
      <div id="receiptBox" class="receipt-box"></div>
      <div class="glass-modal-actions">
        <button class="btn btn-primary" onclick="printReceiptWindow()"><i class="fas fa-print"></i> طباعة</button>
        <button class="btn btn-light" onclick="closeGlassModal('#modalReceipt')">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- Generic Confirm/Alert Modal (replaces native confirm/alert) -->
  <div id="modalGlassConfirm" class="glass-modal hidden">
    <div class="glass-modal-content small">
      <div class="glass-modal-title">
        <span id="gcTitle"><i class="fas fa-question-circle"></i> تأكيد</span>
      </div>
      <div class="glass-modal-body">
        <p id="gcMessage" class="glass-modal-message"></p>
      </div>
      <div class="glass-modal-actions" id="gcActions">
        <button class="btn btn-light" onclick="closeGlassModal('#modalGlassConfirm', false)">إلغاء</button>
        <button class="btn btn-primary" onclick="closeGlassModal('#modalGlassConfirm', true)">تأكيد</button>
      </div>
    </div>
  </div>

</body>
</html>
