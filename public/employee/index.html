<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بوابة الموظف — Moroccan Taste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d47a1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MT Employee">

  <!-- Auth gate -->
  <script>
    (function() {
      try {
        var token = localStorage.getItem('pos_token');
        var session = localStorage.getItem('pos_session');
        if (!token || !session) {
          // No session — show login form (DON'T redirect to main login)
          document.addEventListener('DOMContentLoaded', function() {
            document.body.classList.add('authenticated');
            document.body.classList.add('needs-login');
          });
          return;
        }
        // Has session — go directly to app
        history.replaceState({ emp: true }, '', '/employee/');
        history.pushState({ emp: true }, '', '/employee/');
        window.addEventListener('popstate', function() { history.pushState({ emp: true }, '', '/employee/'); });
        document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('authenticated'); });
      } catch (e) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('authenticated');
          document.body.classList.add('needs-login');
        });
      }
    })();
  </script>
  <style>html,body{background:#0f172a;}body:not(.authenticated){visibility:hidden !important;}</style>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/employee/style.css">

  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/employee/app.js"></script>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p>جاري التحميل...</p>
  </div>

  <!-- Toast -->
  <div class="toast-bar" id="toast"></div>

  <!-- Main App Shell -->
  <div id="app" style="display:none;">

    <!-- Top Bar -->
    <header id="topBar">
      <div class="tb-right">
        <div class="tb-avatar"><i class="fas fa-user-tie"></i></div>
        <div>
          <div class="tb-title" id="headerName">بوابة الموظف</div>
          <div class="tb-sub" id="headerSub"></div>
        </div>
      </div>
      <div class="tb-actions">
        <button class="tb-btn" onclick="refreshData()" title="تحديث"><i class="fas fa-sync-alt"></i></button>
        <button class="tb-btn logout-btn" onclick="doLogout()" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <!-- Scrollable Content -->
    <main id="mainContent">

      <!-- Page: Home -->
      <div class="page active" id="pageHome">
        <div id="clockSection"></div>
        <div class="stats-strip" id="homeStats"></div>
        <div class="g-card">
          <div class="g-card-title"><i class="fas fa-history"></i> آخر الحضور</div>
          <div id="recentAtt"></div>
        </div>
      </div>

      <!-- Page: Attendance -->
      <div class="page" id="pageAttendance">
        <div class="g-card">
          <div class="g-card-title"><i class="fas fa-calendar-check"></i> سجل الحضور الشهري</div>
          <div id="fullAtt"></div>
        </div>
      </div>

      <!-- Page: Leave -->
      <div class="page" id="pageLeave">
        <div class="g-card" style="margin-bottom:10px;">
          <div class="g-card-title"><i class="fas fa-umbrella-beach"></i> أرصدة الإجازات</div>
          <div id="leaveBalances"></div>
        </div>
        <button class="btn btn-primary" id="btnNewLeave" onclick="openLeaveModal()" style="margin-bottom:12px;"><i class="fas fa-plus"></i> طلب إجازة</button>
        <div class="g-card">
          <div class="g-card-title"><i class="fas fa-list-alt"></i> طلباتي</div>
          <div id="myLeaveReqs"></div>
        </div>
      </div>

      <!-- Page: Profile -->
      <div class="page" id="pageProfile">
        <div class="g-card">
          <div class="g-card-title"><i class="fas fa-id-card"></i> بياناتي الشخصية</div>
          <div id="profileInfo"></div>
        </div>
        <div class="g-card">
          <div class="g-card-title"><i class="fas fa-money-bill-wave"></i> كشف الرواتب</div>
          <div id="payslips"></div>
        </div>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="nav-tab active" onclick="navTo('Home',this)"><i class="fas fa-home"></i><span>الرئيسية</span></div>
      <div class="nav-tab" onclick="navTo('Attendance',this)"><i class="fas fa-clock"></i><span>الحضور</span></div>
      <div class="nav-tab" onclick="navTo('Leave',this)"><i class="fas fa-calendar-alt"></i><span>الإجازات</span></div>
      <div class="nav-tab" onclick="navTo('Profile',this)"><i class="fas fa-user"></i><span>ملفي</span></div>
    </nav>

  </div>

  <!-- Leave Request Modal -->
  <div class="g-modal" id="leaveModal">
    <div class="g-modal-content">
      <div class="g-modal-title">
        <span><i class="fas fa-calendar-plus" style="color:var(--blue);margin-left:6px;"></i> طلب إجازة</span>
        <button class="g-modal-close" onclick="closeLeaveModal()">&times;</button>
      </div>
      <div class="form-group"><label>نوع الإجازة</label><select class="form-input" id="lfType"></select></div>
      <div class="form-group"><label>من تاريخ</label><input type="date" class="form-input" id="lfStart"></div>
      <div class="form-group"><label>إلى تاريخ</label><input type="date" class="form-input" id="lfEnd"></div>
      <div class="form-group"><label>السبب</label><textarea class="form-input" id="lfReason" rows="2" placeholder="اختياري"></textarea></div>
      <button class="btn btn-primary" onclick="submitLeave()"><i class="fas fa-paper-plane"></i> تقديم الطلب</button>
    </div>
  </div>

</body>
</html>
