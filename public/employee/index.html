<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بوابة الموظف</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <script>
    (function(){try{var t=localStorage.getItem('pos_token'),s=localStorage.getItem('pos_session');
    if(t&&s){document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('ok');});}
    else{document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('ok','needs-login');});}
    }catch(e){document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('ok','needs-login');});}})();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;direction:rtl;background:#f8f9fb;color:#1a1a2e;height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:100vw;}
    body:not(.ok){visibility:hidden!important;}
    #app{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;height:54px;flex-shrink:0;}
    .hdr-r{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
    .hdr-av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .hdr-n{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .hdr-s{font-size:10px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .hdr-b{display:flex;gap:4px;flex-shrink:0;}
    .hdr-b button{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.1);color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .main{flex:1;overflow-y:auto;padding:12px;padding-bottom:65px;}
    .clock-btn{width:100%;padding:18px 16px;border-radius:16px;border:none;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:10px;font-family:inherit;text-align:right;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.1);}
    .clock-btn:active{transform:scale(.98);}
    .clock-btn i{font-size:30px;}
    .clock-lbl{font-size:17px;font-weight:900;}
    .clock-time{font-size:12px;opacity:.85;margin-top:2px;font-family:monospace;}
    .ci{background:linear-gradient(135deg,#059669,#10b981);}
    .co{background:linear-gradient(135deg,#dc2626,#ef4444);}
    .cd{background:#fff;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:default;box-shadow:none;}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
    .st{background:#fff;border-radius:12px;padding:10px 6px;text-align:center;border:1px solid #eef2f7;box-shadow:0 1px 3px rgba(0,0,0,.03);}
    .st i{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 auto 4px;}
    .st b{display:block;font-size:18px;font-weight:900;color:#0f172a;}
    .st span{font-size:9px;color:#64748b;font-weight:700;}
    .card{background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;border:1px solid #eef2f7;box-shadow:0 1px 3px rgba(0,0,0,.02);}
    .card-t{font-size:13px;font-weight:800;color:#0f172a;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .card-t i{color:#6366f1;font-size:13px;}
    .ar{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
    .ar:last-child{border-bottom:none;}
    .ad{font-weight:700;min-width:58px;color:#334155;flex-shrink:0;}
    .at{flex:1;color:#64748b;}
    .ah{font-weight:900;color:#6366f1;flex-shrink:0;font-size:12px;}
    .meta{font-size:9px;color:#94a3b8;margin-top:1px;}
    .lc{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
    .lc:last-child{border-bottom:none;}
    .pf{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
    .pf:last-child{border-bottom:none;}
    .pf span{color:#64748b;font-weight:600;} .pf b{color:#0f172a;}
    .badge{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;background:#eef2ff;color:#4f46e5;}
    .empty{text-align:center;color:#94a3b8;padding:20px;font-size:13px;}
    .bnav{display:flex;background:#fff;border-top:1px solid #eef2f7;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0));position:fixed;bottom:0;left:0;right:0;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.03);}
    .nt{flex:1;text-align:center;padding:4px;cursor:pointer;color:#94a3b8;font-size:9px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s;}
    .nt i{font-size:18px;}
    .nt.active{color:#6366f1;}
    .btn-m{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:800;border:none;cursor:pointer;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-bottom:8px;box-shadow:0 3px 10px rgba(99,102,241,.25);}
    .btn-m:active{transform:scale(.98);}
    .fg{margin-bottom:10px;} .fg label{display:block;font-size:11px;font-weight:700;color:#334155;margin-bottom:3px;}
    .fi{width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;background:#fff;}
    .fi:focus{border-color:#6366f1;outline:none;box-shadow:0 0 0 3px rgba(99,102,241,.08);}
    .toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;display:none;max-width:90%;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.12);}
    .toast.show{display:block;animation:sd .25s ease;} .toast.ok{background:#0f172a;color:#fff;} .toast.err{background:#ef4444;color:#fff;}
    @keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    .page{display:none;} .page.active{display:block;}
    .login-w{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:16px;background:#f8f9fb;}
    .login-b{background:#fff;border-radius:20px;padding:32px 22px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.06);}
    .login-b h1{font-size:20px;color:#0f172a;margin-bottom:4px;} .login-b p{color:#64748b;font-size:11px;margin-bottom:20px;}
    .login-b input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;margin-bottom:10px;text-align:right;background:#f8f9fb;}
    .login-b input:focus{border-color:#6366f1;outline:none;background:#fff;}
    .login-b button{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(99,102,241,.25);}
    .login-b button:active{transform:scale(.98);}
    .modal{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
    .modal.show{opacity:1;pointer-events:all;}
    .modal-c{background:#fff;border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:380px;transform:translateY(100%);transition:transform .3s;}
    .modal.show .modal-c{transform:translateY(0);}
    .modal-h{display:flex;justify-content:space-between;font-size:14px;font-weight:800;margin-bottom:10px;}
    .modal-h button{width:26px;height:26px;border-radius:6px;background:#f1f5f9;border:none;font-size:14px;cursor:pointer;}
  </style>
  <script defer src="/shared/api-bridge.js"></script>
  <script defer src="/employee/app.js?v=4"></script>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="app">
  <div class="hdr">
    <div class="hdr-r"><div class="hdr-av"><i class="fas fa-user-tie"></i></div><div><div class="hdr-n" id="hdrName">الموظف</div><div class="hdr-s" id="hdrSub"></div></div></div>
    <div class="hdr-b"><button onclick="doRefresh()"><i class="fas fa-sync-alt"></i></button><button style="background:rgba(239,68,68,.3);" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button></div>
  </div>
  <div class="main">
    <div class="page active" id="pghome"><div id="clockSection"></div><div class="stats" id="homeStats"></div><div class="card"><div class="card-t"><i class="fas fa-history"></i> آخر الحضور</div><div id="recentAtt"></div></div></div>
    <div class="page" id="pgatt"><div class="card"><div class="card-t"><i class="fas fa-calendar-check"></i> سجل الحضور</div><div id="attList"></div></div></div>
    <div class="page" id="pgleave"><div class="card"><div class="card-t"><i class="fas fa-umbrella-beach"></i> أرصدة الإجازات</div><div id="leaveBals"></div></div><button class="btn-m" onclick="openLeaveForm()"><i class="fas fa-plus"></i> طلب إجازة</button><div class="card"><div class="card-t"><i class="fas fa-list"></i> طلباتي</div><div id="leaveReqs"></div></div></div>
    <div class="page" id="pgme"><div class="card"><div class="card-t"><i class="fas fa-id-card"></i> بياناتي</div><div id="profileInfo"></div></div><div class="card"><div class="card-t"><i class="fas fa-money-bill-wave"></i> الرواتب</div><div id="payslips"></div></div></div>
  </div>
  <nav class="bnav"><div class="nt active" onclick="navTo('home',this)"><i class="fas fa-home"></i>الرئيسية</div><div class="nt" onclick="navTo('att',this)"><i class="fas fa-fingerprint"></i>البصمة</div><div class="nt" onclick="navTo('leave',this)"><i class="fas fa-calendar"></i>إجازات</div><div class="nt" onclick="navTo('me',this)"><i class="fas fa-user"></i>ملفي</div></nav>
</div>
<div class="modal" id="leaveModal"><div class="modal-c"><div class="modal-h"><span><i class="fas fa-calendar-plus"></i> طلب إجازة</span><button onclick="closeLeaveForm()">&times;</button></div><div class="fg"><label>النوع</label><select class="fi" id="lfType"></select></div><div class="fg"><label>من</label><input type="date" class="fi" id="lfStart"></div><div class="fg"><label>إلى</label><input type="date" class="fi" id="lfEnd"></div><div class="fg"><label>السبب</label><textarea class="fi" id="lfReason" rows="2"></textarea></div><button class="btn-m" onclick="submitLeave()"><i class="fas fa-paper-plane"></i> تقديم</button></div></div>
</body>
</html>
